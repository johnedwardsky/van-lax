<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABRAKADABRA | Generative Spirograph</title>
    <meta name="description" content="Interactive generative spirals.">
    <link rel="stylesheet" href="phi-geometry.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div class="lang-switch-global">
            <a href="abrakadabra.html" class="active">EN</a>
            <span>|</span>
            <a href="abrakadabra-ru.html">RU</a>
        </div>

        <header>
            <div class="title-group">
                <h1>ABRAKADABRA</h1>
                <p class="subtitle">Magic through geometry and light</p>
            </div>
        </header>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <div id="shape-name" class="shape-indicator"><span style="opacity: 0.5; font-weight: 200;">Current flow: </span> Eternal</div>
            <div class="btn-group">
                <a href="index.html" class="btn secondary link-btn">Return to Main</a>
                <button id="play-pause" class="btn">Stop</button>
                <button id="pin" class="btn pin-btn" style="display:none">Pin ✦</button>
                <button id="randomize" class="btn secondary">Generate</button>
                <a href="abrakadabra-galaxy.html" class="btn secondary link-btn">Gallery</a>
            </div>
            <div class="info-panel" style="justify-content: center; opacity: 0.7;">
                <div class="stat"><span class="label">ω₁</span> <span id="val-lrpm">2.000</span></div>
                <div class="stat"><span class="label">ω₂</span> <span id="val-rrpm">-3.000</span></div>
                <div class="stat"><span class="label">S</span> <span id="val-symmetry">1</span></div>
            </div>
        </div>

        <footer>
            <p>Exploring harmony through mathematics and light</p>
        </footer>
    </div>

    <!-- Pin Modal -->
    <div id="pin-modal" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.88); z-index:500; align-items:center; justify-content:center; padding:20px;">
        <div style="background:#0a0c12; border:1px solid rgba(229,178,54,0.4); padding:36px 32px; max-width:480px; width:100%; position:relative;">
            <button id="pin-modal-close" style="position:absolute;top:14px;right:18px;background:none;border:none;color:rgba(255,255,255,0.4);font-size:1.6rem;cursor:pointer;line-height:1;">×</button>
            <p style="font-size:0.65rem;letter-spacing:0.35em;text-transform:uppercase;color:rgba(229,178,54,0.6);margin-bottom:12px;">Save to Galaxy Gallery</p>
            <h2 style="font-family:'Cormorant Garamond',serif;font-weight:300;font-size:1.8rem;color:#e5b236;margin-bottom:24px;">Name Your Galaxy</h2>
            <input id="pin-name" type="text" placeholder="e.g. Spiral Vortex, Golden Rose…" maxlength="60"
                style="width:100%;background:rgba(255,255,255,0.04);border:1px solid rgba(229,178,54,0.3);color:#fff;padding:12px 16px;font-family:'Montserrat',sans-serif;font-size:0.9rem;outline:none;margin-bottom:20px;">
            <p style="font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:8px;">Geometric Formula</p>
            <div id="pin-formula" style="font-family:'Courier New',monospace;font-size:0.72rem;color:rgba(229,178,54,0.55);background:rgba(229,178,54,0.04);border:1px solid rgba(229,178,54,0.1);padding:12px 14px;line-height:1.9;margin-bottom:28px;"></div>
            <button id="pin-confirm" class="btn" style="width:100%;">Pin to Gallery ✦</button>
        </div>
    </div>

    <script src="abrakadabra.js"></script>
</body>
</html>
