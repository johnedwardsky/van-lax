<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phi Geometry | Generative Sacred Art</title>
    <meta name="description" content="Interactive generative geometry based on the laws of Phi, the golden ratio, and sacred proportions.">
    <link rel="stylesheet" href="phi-geometry.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
</head>
<body>
    <div id="app">
        <div class="lang-switch-global">
            <a href="phi-geometry.html" class="active">EN</a>
            <span>|</span>
            <a href="phi-geometry-ru.html">RU</a>
        </div>

        <header>
            <div class="title-group">
                <h1>Phi Geometry</h1>
                <p class="subtitle">Interactive spirals and circle intersections: √2, √3, φ</p>
            </div>
        </header>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <div id="shape-name" class="shape-indicator"><span style="opacity: 0.5; font-weight: 200;">Current projection: </span> Harmony</div>
            <div class="btn-group">
                <a href="index.html" class="btn secondary link-btn">Return to Main</a>
                <button id="randomize" class="btn">Transform Shape</button>
                <button id="toggle-points" class="btn secondary">Intersection Points</button>
                <a href="index.html?section=3" class="btn secondary link-btn">ABRAKADABRA</a>
            </div>
            <div class="info-panel">
                <div class="stat"><span class="label">φ</span> <span id="val-phi">1.618</span></div>
                <div class="stat"><span class="label">√2</span> <span id="val-sqrt2">1.414</span></div>
                <div class="stat"><span class="label">√3</span> <span id="val-sqrt3">1.732</span></div>
            </div>
        </div>

        <footer>
            <p>Exploring harmony through mathematics and light</p>
        </footer>
    </div>

    <script src="phi-geometry.js"></script>
</body>
</html>
