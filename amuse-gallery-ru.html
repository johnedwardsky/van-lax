<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Генеративная Галерея #3 - ABRAKADABRA</title>
    <meta name="description" content="Интерактивные генеративные спирали.">
    <link rel="stylesheet" href="phi-geometry.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300&family=Montserrat:wght@200;300;400;500&display=swap" rel="stylesheet">
</head>
<body>
    <div id="app">
        <div class="lang-switch-global">
            <a href="amuse-gallery.html">EN</a>
            <span>|</span>
            <a href="amuse-gallery-ru.html" class="active">RU</a>
        </div>

        <header>
            <div class="content-overlay">
                <div class="header">
                    <div class="g1-elegant-title" style="font-size: 0.8rem; letter-spacing: 0.5em; color: var(--gold); opacity: 0.8; margin-bottom: 10px;">ГЕНЕРАТИВНАЯ ГАЛЕРЕЯ #3</div>
                    <h1 style="margin: 0; font-size: 3rem; letter-spacing: 0.2em; font-weight: 400; color: #fff;">ABRAKADABRA</h1>
                    <p id="shape-name" style="margin-top: 10px; font-size: 0.9rem; letter-spacing: 0.1em; color: var(--gold); opacity: 0.6; height: 1.2em;">Инициализация Вселенной...</p>
                </div>
            </div>
        </header>

        <canvas id="canvas"></canvas>

        <div class="controls">
            <div id="shape-name" class="shape-indicator"><span style="opacity: 0.5; font-weight: 200;">Текущий поток: </span> Вечность</div>
            <div class="btn-group">
                <a href="index-ru.html" id="exit-btn" class="btn secondary link-btn">На главную</a>
                <button id="play-pause" class="btn">Пауза</button>
                <button id="rand-a" class="btn secondary">Ранд A</button>
                <button id="rand-b" class="btn secondary">Ранд B</button>
                <button id="rand-c" class="btn secondary">Ранд C</button>
                <button id="rand-d" class="btn secondary">Ранд D</button>
                <a href="phi-geometry-ru.html" class="btn secondary link-btn">Геометрия Фи</a>
                <button id="next-btn" class="btn secondary link-btn" style="display: none;">Следующая галерея</button>
            </div>
            <div class="info-panel" style="justify-content: center; opacity: 0.7;">
                <div class="stat"><span class="label">ω₁</span> <span id="val-lrpm">2.000</span></div>
                <div class="stat"><span class="label">ω₂</span> <span id="val-rrpm">-3.000</span></div>
                <div class="stat"><span class="label">S</span> <span id="val-symmetry">1</span></div>
            </div>
        </div>

        <footer>
            <p>Исследование гармонии через математику и свет</p>
        </footer>
    </div>

    <script src="amuse-gallery.js"></script>
    <script>
        // Handle iframe communication
        const isIframe = window.self !== window.top;
        if (isIframe) {
            const exitBtn = document.getElementById('exit-btn');
            const nextBtn = document.getElementById('next-btn');
            
            if (exitBtn) {
                exitBtn.href = "#";
                exitBtn.onclick = (e) => {
                    e.preventDefault();
                    window.parent.exitSection();
                };
            }
            
            if (nextBtn) {
                nextBtn.style.display = "inline-block";
                nextBtn.onclick = (e) => {
                    e.preventDefault();
                    window.parent.nextSection(3);
                };
            }
        }
    </script>
</body>
</html>
